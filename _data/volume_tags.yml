# Volume tags — a SEPARATE axis from research_domains.yml.
# research_domains.yml = which of the 7 research domains an article belongs to
#   (Knowledge / Reasoning / Decisions / Agents / Platforms / Deployment / Products)
# volume_tags.yml = what KIND of article it is within its volume
#   (Case / Framework / Critique / Field Note / etc.)
#
# Not wired into any layout yet — placeholder for a future per-post
# `volume_tag:` front matter field once the pattern across articles is clear.
# Example intent:
#   Volume I  -> Case       (articles making the case for a governed decision layer)
#   Volume II -> Framework  (articles introducing structured methodology)

- volume: "Volume I"
  tag: "Case"
- volume: "Volume II"
  tag: "Framework"
